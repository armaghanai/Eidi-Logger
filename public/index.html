<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Eidi Logger</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen relative">
  
  <div class="aurora-bg">
    <div class="blob"></div>
    <div class="blob" style="animation-delay: -5s; right: -10%; background: #0ea5e9;"></div>
    <div class="blob" style="animation-delay: -10s; bottom: -20%; left: 20%; background: #ec4899;"></div>
  </div>

  <button id="themeToggle" class="theme-switch" aria-label="Toggle dark/light theme">🌙</button>

  <main class="glass-card w-[92vw] max-w-[440px] p-8 md:p-12 relative z-10 animate-reveal">
    <div class="mb-10 text-center">
      <h1 class="text-4xl font-extrabold tracking-tight brand-font text-gradient mb-3">Welcome Back</h1>
      <p class="text-[var(--text-muted)] font-medium">Log in to your encrypted ledger.</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div class="space-y-2 relative">
        <label for="email" class="text-[11px] font-bold uppercase tracking-widest text-[var(--text-muted)] ml-1">Email Address</label>
        <div class="relative">
           <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[var(--text-muted)] opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
           </svg>
           <input type="email" id="email" placeholder="name@example.com" class="pl-12" required />
        </div>
      </div>

      <div class="space-y-2 relative">
        <label for="password" class="text-[11px] font-bold uppercase tracking-widest text-[var(--text-muted)] ml-1">Password</label>
        <div class="relative">
           <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[var(--text-muted)] opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
           </svg>
           <input type="password" id="password" placeholder="••••••••" class="pl-12" required minlength="6" />
        </div>
      </div>

      <div class="flex flex-col gap-3 pt-2">
        <button type="submit" id="loginBtn" class="btn w-full py-3.5 text-[1.05rem]">Log In</button>
        <button type="button" id="signUpBtn" class="btn btn-ghost w-full py-3 text-[1.05rem]">Create Account</button>
      </div>
    </form>

    <div class="min-h-6 mt-5 flex items-center justify-center">
      <p id="status" class="text-[13px] font-semibold text-center leading-tight"></p>
    </div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
